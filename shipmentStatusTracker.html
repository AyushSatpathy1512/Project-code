<template>
    <div class="tracker-wrap">

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="tracker-card state-card">
                <lightning-spinner alternative-text="Loading…" size="small"></lightning-spinner>
                <p class="state-msg">Loading shipment…</p>
            </div>
        </template>

        <!-- No shipment found -->
        <template if:true={showNoShipment}>
            <div class="tracker-card state-card">
                <p class="state-msg">No shipment found for this record.</p>
            </div>
        </template>

        <!-- Wire / load error -->
        <template if:true={showError}>
            <div class="tracker-card state-card">
                <p class="state-msg state-error">{errorMessage}</p>
            </div>
        </template>

        <!-- ── Main Card ─────────────────────────────────────────────────── -->
        <template if:true={hasShipment}>
            <div class="tracker-card">

                <!-- Header -->
                <div class="card-header">
                    <span class="card-title">Shipment Status</span>
                    <span class="status-badge">
                        <template if:true={isActive}>
                            <span class="pulse-dot"></span>
                        </template>
                        {shipment.Status__c}
                    </span>
                </div>

                <!-- Steps -->
                <div class="steps">
                    <template for:each={steps} for:item="step">
                        <div key={step.label} class="step">

                            <div class={step.dotClass}>
                                <template if:true={step.isDone}>
                                    <svg class="dot-check" viewBox="0 0 12 12" fill="none">
                                        <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8"
                                              stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </template>
                                <template if:true={step.isActive}>
                                    <div class="dot-active-ring"></div>
                                </template>
                                <template if:true={step.isPending}>
                                    <div class="dot-pending"></div>
                                </template>
                            </div>

                            <template if:false={step.isLast}>
                                <div class={step.connectorClass}></div>
                            </template>

                            <span class={step.labelClass}>{step.label}</span>
                        </div>
                    </template>
                </div>

                <hr class="divider" />

                <!-- Tracking Number -->
                <div class="info-row">
                    <span class="info-label">Tracking number</span>
                    <span class="info-value">
                        {shipment.Tracking_Number__c}
                        <a class="ext-link" href={trackingLink} target="_blank" rel="noopener noreferrer">
                            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                                <path d="M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V7M8 1h3m0 0v3M11 1L5.5 6.5"
                                      stroke="#185FA5" stroke-width="1.3"
                                      stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Track
                        </a>
                    </span>
                </div>

                <hr class="divider" />

                <!-- ETA + Countdown -->
                <div class="info-row eta-row">
                    <div>
                        <span class="info-label">ETA</span>
                        <div class="eta-date">{formattedETA}</div>
                    </div>
                    <div class="countdown">
                        <div class="time-block">
                            <span class="time-num">{cdHours}</span>
                            <span class="time-sub">hrs</span>
                        </div>
                        <span class="time-sep">:</span>
                        <div class="time-block">
                            <span class="time-num">{cdMinutes}</span>
                            <span class="time-sub">min</span>
                        </div>
                        <span class="time-sep">:</span>
                        <div class="time-block">
                            <span class="time-num">{cdSeconds}</span>
                            <span class="time-sub">sec</span>
                        </div>
                    </div>
                </div>

                <!-- Refresh error (only shown after a failed refresh attempt) -->
                <template if:true={errorMessage}>
                    <div class="error-banner" role="alert">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
                             style="flex-shrink:0;margin-top:1px;">
                            <circle cx="7" cy="7" r="6" stroke="#c23934" stroke-width="1.4"/>
                            <path d="M7 4v3.5M7 9.5v.5" stroke="#c23934" stroke-width="1.4"
                                  stroke-linecap="round"/>
                        </svg>
                        <span class="error-text">{errorMessage}</span>
                    </div>
                </template>

                <!-- Refresh Button -->
                <button class="refresh-btn" onclick={handleRefresh} disabled={isRefreshing}>
                    <span class={refreshIconClass}>
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                            <path d="M12.5 7A5.5 5.5 0 112.3 3.8M2 1v3h3"
                                  stroke="currentColor" stroke-width="1.4"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    {refreshLabel}
                </button>

            </div>
        </template>

    </div>
</template>
